<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Place2Eat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,900&family=Noto+Serif+TC:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#fbf4e9; --paper:#fffaf2; --warm:#fdeede;
    --ink:#3a2f28; --ink-soft:#7d6c5d; --line:#ecd9c4;
    --persimmon:#e8552a; --tangerine:#f4843b; --saffron:#f6b53d;
    --chili:#c8341a; --herb:#5e8c4a; --herb-dark:#3f6b32;
    --flame:linear-gradient(118deg,#e8552a 0%,#f4843b 45%,#f6b53d 100%);
    --shadow:0 1px 2px rgba(58,47,40,.06),0 10px 30px rgba(200,90,40,.10);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:"Noto Serif TC","Hiragino Mincho ProN","Yu Mincho",serif;color:var(--ink);background:var(--cream);
    display:flex;flex-direction:column;min-height:100vh;-webkit-font-smoothing:antialiased;
  }
  header{
    padding:18px 24px;color:#fff;position:relative;overflow:hidden;
    background:var(--flame);background-size:200% 200%;animation:flow 14s ease infinite;
    display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;
  }
  @keyframes flow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
  header::after{content:"";position:absolute;inset:0;background:radial-gradient(120% 80% at 90% -20%,rgba(255,255,255,.28),transparent 60%);pointer-events:none}
  .brand{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;position:relative;z-index:1}
  h1{font-family:"Fraunces",serif;font-weight:900;font-size:28px;margin:0;letter-spacing:-.015em;text-shadow:0 2px 8px rgba(150,50,20,.25)}
  .tagline{font-size:13.5px;margin:0;color:rgba(255,255,255,.92);max-width:540px}
  .region{display:flex;gap:6px;position:relative;z-index:1}
  .region button{font-family:inherit;font-size:13px;font-weight:500;padding:5px 13px;border-radius:18px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.5);color:#fff;cursor:pointer;transition:background .15s}
  .region button:hover{background:rgba(255,255,255,.3)}
  .region button.on{background:#fff;color:var(--persimmon);border-color:#fff}

  .gate{max-width:560px;margin:7vh auto;padding:34px 32px;background:var(--paper);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow)}
  .gate h2{font-family:"Fraunces",serif;font-weight:600;font-size:21px;margin:0 0 10px;color:var(--persimmon)}
  .gate p{font-size:14px;line-height:1.75;color:var(--ink-soft);margin:0 0 14px}
  .gate ol{font-size:13.5px;line-height:1.8;color:var(--ink-soft);padding-left:20px;margin:0 0 18px}
  .gate code{background:var(--warm);padding:1px 6px;border-radius:5px;font-size:12.5px;color:var(--chili)}
  .keyrow{display:flex;gap:10px;flex-wrap:wrap}
  .keyrow input{flex:1;min-width:220px}

  input[type=text],input[type=password],input[type=number]{
    font-family:inherit;font-size:14px;color:var(--ink);
    padding:10px 13px;border:1px solid var(--line);border-radius:10px;background:var(--paper);outline:none;transition:border-color .15s,box-shadow .15s;
  }
  input:focus{border-color:var(--tangerine);box-shadow:0 0 0 3px rgba(244,132,59,.2)}

  button{font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;border:none;border-radius:10px;padding:10px 18px;color:#fff;background:var(--flame);background-size:160% 160%;transition:transform .08s,box-shadow .15s,background-position .3s}
  button:hover{background-position:100% 0;box-shadow:0 6px 18px rgba(232,85,42,.32)}
  button:active{transform:translateY(1px) scale(.99)}
  button.ghost{background:transparent;color:var(--persimmon);border:1px solid var(--line)}
  button.ghost:hover{background:var(--warm);border-color:var(--tangerine);box-shadow:none}
  button.ghost.on{background:var(--persimmon);color:#fff;border-color:var(--persimmon)}

  .controls{display:flex;gap:16px 26px;flex-wrap:wrap;align-items:flex-end;padding:13px 24px 11px;border-bottom:1px solid var(--line);background:var(--paper)}
  .howto{border-bottom:1px solid var(--line);background:var(--warm)}
  .howto>summary{cursor:pointer;list-style:none;padding:9px 24px;font-size:13px;font-weight:600;color:var(--persimmon);display:flex;align-items:center;gap:8px;user-select:none;-webkit-user-select:none}
  .howto>summary::-webkit-details-marker{display:none}
  .howto>summary::before{content:"";width:15px;height:15px;flex:none;border-radius:50%;border:1.5px solid var(--persimmon);background:radial-gradient(circle at 50% 32%,var(--persimmon) 0 1.2px,transparent 1.6px),radial-gradient(circle at 50% 62%,var(--persimmon) 0 1.6px,transparent 2px)}
  .howto>summary::after{content:"▾";margin-left:auto;font-size:12px;transition:transform .2s;color:var(--ink-soft)}
  .howto[open]>summary::after{transform:rotate(180deg)}
  .howto-body{padding:2px 24px 15px;font-size:13px;line-height:1.7;color:var(--ink-soft)}
  .howto-body b{color:var(--ink);font-weight:600}
  .howto-body ol{margin:4px 0 0;padding-left:20px}
  .howto-body li{margin:6px 0}
  .field{display:flex;flex-direction:column;gap:5px}
  .field label{font-size:11.5px;letter-spacing:.04em;color:var(--ink-soft);text-transform:uppercase;font-family:"Fraunces",serif;font-weight:600}
  .field .val{font-family:"Fraunces",serif;font-weight:700;color:var(--persimmon)}
  .seg{display:flex;gap:6px}
  input[type=range]{width:160px;accent-color:var(--persimmon)}
  .num{width:80px}
  .grow{flex:1}
  .searchbtn{padding:11px 28px;font-size:15px;font-weight:700}

  .catbar{display:flex;align-items:flex-start;gap:14px;padding:10px 24px;border-bottom:1px solid var(--line);background:var(--warm)}
  .catbar.top{border-bottom:none;padding-bottom:6px}
  .catbar.bot{padding-top:6px}
  .catlabel{font-family:"Fraunces",serif;font-weight:700;font-size:14.5px;white-space:nowrap;padding-top:6px;min-width:62px}
  .catlabel.v{color:var(--herb-dark)} .catlabel.f{color:var(--chili)}
  .chips{display:flex;gap:8px;flex-wrap:wrap}
  .chip{font-family:inherit;font-size:13.5px;padding:6px 14px;border-radius:22px;background:var(--paper);border:1px solid var(--line);color:var(--ink-soft);cursor:pointer;transition:transform .12s,background .15s,color .15s,border-color .15s,box-shadow .15s}
  .chip:hover{border-color:var(--tangerine);color:var(--ink);transform:translateY(-2px)}
  .chip.onv{background:var(--herb);color:#fff;border-color:transparent;box-shadow:0 4px 12px rgba(94,140,74,.3)}
  .chip.onf{background:var(--flame);color:#fff;border-color:transparent;box-shadow:0 4px 12px rgba(232,85,42,.3)}

  .smartbar{display:flex;gap:12px;align-items:center;padding:13px 24px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#fff,var(--warm))}
  .smartbar .lbl{font-family:"Fraunces",serif;font-weight:700;color:var(--persimmon);font-size:15px;white-space:nowrap;display:flex;align-items:center;gap:6px}
  .smartbar .spark{animation:twinkle 2.2s ease-in-out infinite}
  @keyframes twinkle{0%,100%{opacity:.45;transform:scale(.9)}50%{opacity:1;transform:scale(1.18)}}
  .smartbar input{flex:1;min-width:0;padding:11px 14px;font-size:15px}
  .smartbar button{white-space:nowrap;padding:11px 24px;font-size:15px}
  .why{margin-top:8px;font-size:12.5px;color:var(--herb-dark);line-height:1.55;background:rgba(94,140,74,.09);border-left:3px solid var(--herb);padding:6px 11px;border-radius:0 8px 8px 0}
  .why .sp{color:var(--persimmon);font-weight:700;margin-right:5px}
  #app{display:flex;flex-direction:column;flex:1;min-height:0}
  main{flex:1;display:grid;grid-template-columns:minmax(0,1.4fr) minmax(330px,1fr);min-height:0}
  #map{width:100%;height:100%;min-height:360px;background:var(--warm)}
  .panel{display:flex;flex-direction:column;border-left:1px solid var(--line);background:var(--cream);min-height:0}
  .panel-head{padding:13px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--paper)}
  .count{font-family:"Fraunces",serif;font-weight:700;font-size:14.5px;color:var(--persimmon)}
  .sort{display:flex;gap:5px}
  .sort button{padding:6px 11px;font-size:12.5px;background:transparent;color:var(--ink-soft);border:1px solid var(--line)}
  .sort button:hover{box-shadow:none;background:var(--warm)}
  .sort button.on{background:var(--herb);color:#fff;border-color:var(--herb)}
  .results{flex:1;overflow-y:auto;padding:8px 14px 24px}

  .card{position:relative;display:flex;gap:13px;padding:15px 14px 15px 12px;border-bottom:1px solid var(--line);cursor:pointer;border-radius:12px;transition:background .12s,transform .12s,box-shadow .15s;animation:rise .5s cubic-bezier(.2,.7,.2,1) both;animation-delay:calc(var(--i,0)*45ms)}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  .card:hover{background:var(--paper);transform:translateY(-2px);box-shadow:var(--shadow)}
  .card.active{background:var(--paper);box-shadow:inset 4px 0 0 var(--persimmon),var(--shadow)}
  .rank{flex:none;width:30px;height:30px;border-radius:50%;background:var(--flame);color:#fff;font-family:"Fraunces",serif;font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center;margin-top:2px;box-shadow:0 3px 8px rgba(232,85,42,.35)}
  .body{flex:1;min-width:0}
  .name{font-weight:700;font-size:16.5px;color:var(--ink);margin:0 0 6px;line-height:1.35}
  .ribbon{display:inline-block;font-size:11px;font-weight:700;color:#fff;background:var(--chili);padding:1px 8px;border-radius:5px;margin-left:7px;vertical-align:2px;letter-spacing:.05em}
  .meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:13px;color:var(--ink-soft)}
  .stars{display:inline-flex;align-items:center;gap:4px;font-family:"Fraunces",serif;font-weight:700}
  .stars svg{width:15px;height:15px}
  .stars.hot{color:var(--chili)} .stars.warm{color:var(--persimmon)} .stars.mild{color:#c98a1e}
  .pill{font-size:11.5px;padding:2px 9px;border-radius:20px;background:var(--warm);border:1px solid var(--line);color:var(--ink-soft)}
  .addr{font-size:12.5px;color:var(--ink-soft);margin:8px 0 0;line-height:1.5;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .gmlink{font-size:12.5px;color:var(--herb-dark);text-decoration:none;border-bottom:1.5px solid var(--herb);margin-top:8px;display:inline-block;transition:color .12s,border-color .12s}
  .gmlink:hover{color:var(--persimmon);border-color:var(--tangerine)}
  .hours{margin-top:8px;font-size:12.5px;color:var(--ink-soft);display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .hours .open{font-weight:700;color:#fff;background:var(--herb);padding:1px 8px;border-radius:5px;font-size:11px}
  .hours .closed{font-weight:700;color:#fff;background:#b3a89a;padding:1px 8px;border-radius:5px;font-size:11px}

  .empty,.loading{padding:44px 26px;text-align:center;color:var(--ink-soft);font-size:14px;line-height:1.85}
  .empty .big{font-family:"Fraunces",serif;font-size:19px;color:var(--persimmon);display:block;margin-bottom:8px}
  .sizzle{display:flex;gap:7px;justify-content:center;margin-bottom:16px}
  .sizzle span{width:12px;height:12px;border-radius:50%;background:var(--flame);animation:bob .7s ease-in-out infinite}
  .sizzle span:nth-child(2){animation-delay:.12s}
  .sizzle span:nth-child(3){animation-delay:.24s}
  @keyframes bob{0%,100%{transform:translateY(0);opacity:.6}50%{transform:translateY(-10px);opacity:1}}

  .pin{width:32px;height:32px;border-radius:50%;background:var(--flame);border:2.5px solid #fff;box-shadow:0 3px 8px rgba(150,50,20,.4);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .15s}
  .pin span{color:#fff;font-family:"Fraunces",serif;font-weight:700;font-size:14px}
  .pin:hover{transform:scale(1.15)}
  .pin.active{animation:pop .5s ease}
  @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.4)}100%{transform:scale(1.15)}}
  .ctr{width:20px;height:20px;border-radius:50%;background:var(--herb);border:3px solid #fff;box-shadow:0 0 0 5px rgba(94,140,74,.28),0 2px 6px rgba(0,0,0,.25);cursor:grab;animation:beat 2s ease-in-out infinite}
  @keyframes beat{0%,100%{box-shadow:0 0 0 5px rgba(94,140,74,.28),0 2px 6px rgba(0,0,0,.25)}50%{box-shadow:0 0 0 11px rgba(94,140,74,0),0 2px 6px rgba(0,0,0,.25)}}

  /* ---- fun / dynamic touches ---- */
  .bowl{display:block;margin:0 auto 16px}
  .bowl path.s1,.bowl path.s2,.bowl path.s3{transform-box:fill-box;transform-origin:center;animation:steam 2.6s ease-in-out infinite}
  .bowl path.s2{animation-delay:.6s}
  .bowl path.s3{animation-delay:1.15s}
  @keyframes steam{0%{opacity:0;transform:translateY(5px) scaleY(.85)}35%{opacity:.85}100%{opacity:0;transform:translateY(-13px) scaleY(1.1)}}
  .pin{animation:drop .45s cubic-bezier(.2,.8,.3,1.4) both;animation-delay:calc(var(--mi,0)*55ms)}
  @keyframes drop{from{opacity:0;transform:translateY(-18px) scale(.55)}to{opacity:1;transform:none}}
  .stars.hot{animation:glow 1.9s ease-in-out infinite}
  @keyframes glow{0%,100%{text-shadow:0 0 0 rgba(200,52,26,0)}50%{text-shadow:0 0 9px rgba(200,52,26,.5)}}
  .ribbon{position:relative;overflow:hidden}
  .ribbon::after{content:"";position:absolute;top:0;left:-70%;width:45%;height:100%;background:linear-gradient(110deg,transparent,rgba(255,255,255,.65),transparent);animation:shine 2.8s ease-in-out infinite}
  @keyframes shine{0%{left:-70%}45%,100%{left:165%}}
  .hours .open .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#fff;margin-right:5px;vertical-align:1px;animation:livedot 1.4s ease-in-out infinite}
  @keyframes livedot{0%,100%{opacity:1}50%{opacity:.4}}
  .count.bump{animation:bump .42s cubic-bezier(.2,.8,.3,1.3)}
  @keyframes bump{0%{transform:scale(1)}35%{transform:scale(1.18)}100%{transform:scale(1)}}
  .card:hover .rank{animation:wobble .55s ease}
  @keyframes wobble{0%,100%{transform:rotate(0)}25%{transform:rotate(-9deg)}60%{transform:rotate(7deg)}}
  .searchbtn{position:relative;overflow:hidden}
  .searchbtn::after{content:"";position:absolute;top:0;left:-80%;width:50%;height:100%;background:linear-gradient(110deg,transparent,rgba(255,255,255,.35),transparent);animation:shine 3.8s ease-in-out infinite}
  .chip:active{transform:scale(.94)}
  .note{font-size:12px;color:var(--ink-soft);padding:11px 20px;border-top:1px solid var(--line);background:var(--paper);line-height:1.6}
  .hidden{display:none!important}
  .err{color:var(--chili);font-size:13px;margin-top:10px}

  @media (max-width:860px){
    html,body{height:auto}
    #app{display:block;flex:none;min-height:0}
    main{display:block}
    #map{height:46vh;min-height:0}
    .panel{display:block;min-height:auto;border-left:none;border-top:1px solid var(--line)}
    .results{overflow:visible;padding:8px 14px 30px}
    h1{font-size:24px}
    input[type=range]{width:120px}
    .controls{gap:10px 16px;padding:11px 16px}
    .howto>summary{padding:9px 16px}
    .howto-body{padding:2px 16px 14px}
    .field label{font-size:10.5px}
    .smartbar{padding:11px 16px;gap:8px}
    .smartbar .lbl{font-size:13px}
    .smartbar button{padding:11px 18px}
    .catbar{padding:8px 16px;gap:10px}
    .catlabel{padding-top:8px;min-width:46px}
    .chips{flex:1;min-width:0;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;scrollbar-width:none}
    .chips::-webkit-scrollbar{display:none}
    .chip{flex:none}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>

<header>
  <div class="brand"><h1 id="brand">Place2Eat</h1><p class="tagline" id="tagline"></p></div>
  <div class="region" id="region">
    <button data-region="tw">台灣</button>
    <button data-region="us">US</button>
    <button data-region="jp">日本</button>
  </div>
</header>

<div id="gate" class="gate hidden">
  <h2 id="gateH2"></h2>
  <p id="gateP"></p>
  <ol><li id="gateLi1"></li><li id="gateLi2"></li></ol>
  <div class="keyrow"><input type="password" id="keyInput" autocomplete="off"><button id="keyGo"></button></div>
  <div id="keyErr" class="err"></div>
</div>

<div id="app" class="hidden">
  <details class="howto">
    <summary id="howtoSummary"></summary>
    <div class="howto-body" id="howtoBody"></div>
  </details>
  <div class="controls">
    <div class="field">
      <label id="centerLabel"></label>
      <div class="seg"><button class="ghost" id="locBtn"></button><button class="ghost" id="pinBtn"></button></div>
    </div>
    <div class="field"><label id="goLabel"></label><input type="text" id="goInput" style="width:170px" autocomplete="off"></div>
    <div class="field"><label id="nameLabel"></label><input type="text" id="nameInput" style="width:170px" autocomplete="off"></div>
    <div class="field">
      <label><span id="radiusLabel"></span> <span class="val" id="radVal"></span></label>
      <input type="range" id="radius" min="500" max="5000" step="100" value="2000">
    </div>
  </div>

  <div class="smartbar">
    <span class="lbl"><span class="spark">✦</span> <span id="aiLbl"></span></span>
    <input type="text" id="aiInput" autocomplete="off">
    <button id="aiGo"></button>
  </div>

  <div class="catbar top">
    <span class="catlabel v" id="venuelabel"></span>
    <div class="chips" id="chips"></div>
  </div>
  <div class="catbar bot">
    <span class="catlabel f" id="foodlabel"></span>
    <div class="chips" id="foodChips"></div>
  </div>

  <div class="controls">
    <div class="field"><label><span id="minRevLabel"></span> <span class="val" id="revVal"></span></label><input type="range" id="minReviews" min="0" max="1000" step="50" value="300" style="width:130px"></div>
    <div class="field"><label><span id="minRatLabel"></span> <span class="val" id="ratVal"></span></label><input type="range" id="minRating" min="3" max="5" step="0.1" value="4.0" style="width:120px"></div>
    <div class="field"><label><span id="priceLabel"></span> <span class="val" id="priceVal"></span></label><input type="range" id="price" min="1" max="4" step="1" value="4" style="width:130px"></div>
    <div class="field grow"></div>
    <div class="field"><label>&nbsp;</label><button class="searchbtn" id="searchBtn"></button></div>
  </div>

  <main>
    <div id="map"></div>
    <div class="panel">
      <div class="panel-head">
        <span class="count" id="count"></span>
        <div class="sort">
          <button data-sort="rating" class="on" id="sRating"></button>
          <button data-sort="reviews" id="sPop"></button>
          <button data-sort="dist" id="sDist"></button>
        </div>
      </div>
      <div class="results" id="results"></div>
      <div class="note" id="note"></div>
    </div>
  </main>
</div>

<script>
const $ = s => document.querySelector(s);
const BOWL = `<svg class="bowl" viewBox="0 0 120 110" width="98" height="90" aria-hidden="true">
  <g stroke-linecap="round" fill="none">
    <path class="s1" d="M44 40 q8 -7 0 -15 q-8 -8 0 -16" stroke="#e8855a" stroke-width="3"/>
    <path class="s2" d="M60 38 q8 -7 0 -15 q-8 -8 0 -16" stroke="#ef9a5c" stroke-width="3"/>
    <path class="s3" d="M76 40 q8 -7 0 -15 q-8 -8 0 -16" stroke="#e8855a" stroke-width="3"/>
  </g>
  <ellipse cx="60" cy="60" rx="40" ry="9" fill="none" stroke="#b3704a" stroke-width="3.5"/>
  <path d="M22 61 q38 46 76 0" fill="none" stroke="#b3704a" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M42 98 h36" stroke="#b3704a" stroke-width="3.5" stroke-linecap="round"/>
</svg>`;

/* ============== LOCALES (cats = venue/format, foods = cuisine) ============== */
const LOCALES = {
  tw:{
    name:'台灣', lang:'zh-Hant', apiLang:'zh-TW', unit:'km',
    radUnit:' 公里', nearSuffix:' 公尺', farSuffix:' 公里',
    rad:{min:500,max:5000,step:100,def:2000}, fallback:{lat:25.0330,lng:121.5654},
    priceAmt:['','NT$200','NT$600','NT$1200'],
    t:{
      brand:'口碑覓食',
      tagline:'選地點、交叉「店家 × 食物」兩種分類，挖出評論多又高分的真口碑',
      gateH2:'放入 Google Maps API 金鑰',

const PRICE_RANK={PRICE_LEVEL_FREE:1,PRICE_LEVEL_INEXPENSIVE:1,PRICE_LEVEL_MODERATE:2,PRICE_LEVEL_EXPENSIVE:3,PRICE_LEVEL_VERY_EXPENSIVE:4};
function priceRank(pl){ return pl?(PRICE_RANK[pl]||null):null; }
function hoursInfo(p){
  const oh=p.regularOpeningHours;
  if(!oh||!oh.periods||!oh.periods.length) return null;
  const periods=oh.periods;
  const off=(typeof p.utcOffsetMinutes==='number')?p.utcOffsetMinutes:(-new Date().getTimezoneOffset());
  const placeNow=new Date(Date.now()+(new Date().getTimezoneOffset()*60000)+off*60000); // wall time at the place
  const day=placeNow.getUTCDay();
  const cur=day*1440+placeNow.getUTCHours()*60+placeNow.getUTCMinutes();
  const pad=n=>String(n).padStart(2,'0');
  const fmt=t=>pad(t.hour||0)+':'+pad(t.minute||0);
  let openNow=false, always=false;
  for(const per of periods){
    if(per.open&&!per.close){ always=true; break; }
    if(!per.open||!per.close) continue;
    let o=per.open.day*1440+(per.open.hour||0)*60+(per.open.minute||0);
    let c=per.close.day*1440+(per.close.hour||0)*60+(per.close.minute||0);
    if(c<o) c+=10080;
    if((cur>=o&&cur<c)||(cur+10080>=o&&cur+10080<c)){ openNow=true; }
  }
  if(always) openNow=true;
  let todayStr='';
  if(always) todayStr='24h';
  else{
    const td=periods.filter(per=>per.open&&per.close&&per.open.day===day);
    if(td.length) todayStr=td.map(per=>fmt(per.open)+'–'+fmt(per.close)).join(', ');
  }
  return { openNow, todayStr };
}

async function runSearch(){
  mode='cat'; userSorted=false; scrollAfterRender=true;
  const radius=+$('#radius').value;
  $('#results').innerHTML=`<div class="loading"><div class="sizzle"><span></span><span></span><span></span></div>${esc(L.t.loading)}</div>`;
  $('#count').textContent=L.t.searching; clearMarkers();

  const { Place, SearchNearbyRankPreference } = await google.maps.importLibrary("places");
  const { spherical } = await google.maps.importLibrary("geometry");

  const venue=venueObj(), food=foodObj();
  const venueAny=venue.id==='all', foodAny=food.id==='all';
  // search by cuisine when chosen (more specific), else by venue format
  const searchTypes = !foodAny ? food.types : venue.types;

  const chunks=chunk(searchTypes,4);
  const seen=new Map(); let failed=0;
  for(const types of chunks){
    const request={
      fields:['id','displayName','location','rating','userRatingCount','formattedAddress','googleMapsURI','primaryTypeDisplayName','types','priceLevel','businessStatus','regularOpeningHours','utcOffsetMinutes'],
      locationRestriction:{ center:searchCenter, radius },
      includedTypes:types, maxResultCount:20,
      rankPreference:SearchNearbyRankPreference.POPULARITY, language:L.apiLang,
    };
    try{ const { places } = await Place.searchNearby(request); (places||[]).forEach(p=>{ if(p.id&&!seen.has(p.id)) seen.set(p.id,p); }); }
    catch(e){ failed++; console.error('searchNearby error',e); }
  }
  if(chunks.length && failed===chunks.length){
    $('#results').innerHTML=`<div class="empty"><span class="big">${esc(L.t.failBig)}</span>${esc(L.t.failText)}</div>`;
    $('#count').textContent=L.t.errCount; return;
  }

  let results=[...seen.values()]
    .filter(p=>p.rating!=null&&p.userRatingCount!=null&&(p.businessStatus==null||p.businessStatus==='OPERATIONAL'));
  // cross filter: searched by cuisine, narrow to chosen venue format
  if(!foodAny && !venueAny){
    const vset=new Set(venue.types);
    results=results.filter(p=>(p.types||[]).some(t=>vset.has(t)));
  }
  const mapped=results.map(p=>({ p, dist:spherical.computeDistanceBetween(searchCenter,p.location) }));
  const desc=$('#aiInput').value.trim();
  viewFilters=true; viewLabel=currentLabel();
  if(desc && mapped.length){
    $('#results').innerHTML=`<div class="loading"><div class="sizzle"><span></span><span></span><span></span></div>${esc(L.t.aiThinking)}</div>`;
    const ranked=await aiRank(mapped, desc);
    if(ranked){ viewKeepOrder=true; lastResults=ranked; render(ranked); return; }
  }
  viewKeepOrder=false; lastResults=mapped; render(mapped);
}

async function aiRank(cands, description){
  // Returns cands reordered with .reason attached (AI matches), or null on failure / no match.
  try{
    const payload={ description, lang:L.apiLang, places:cands.map((c,i)=>({
      i,
      name:(typeof c.p.displayName==='string'?c.p.displayName:(c.p.displayName?.text||'')),
      primaryType:typeName(c.p)||((c.p.types||[])[0]||''),
      price:c.p.priceLevel?(PRICE[c.p.priceLevel]||''):'',
      rating:(c.p.rating!=null?c.p.rating:null),
      reviews:(c.p.userRatingCount!=null?c.p.userRatingCount:0),
      address:c.p.formattedAddress||'',
    })) };
    const res=await fetch('/.netlify/functions/match',{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
    if(!res.ok) return null;
    const data=await res.json();
    const matches=Array.isArray(data.matches)?data.matches:[];
    if(!matches.length) return null;
    const seen=new Set();
    const ranked=matches.map(m=>{ if(seen.has(m.i)) return null; seen.add(m.i); const c=cands[m.i]; if(c) c.reason=m.reason; return c; }).filter(Boolean);
    return ranked.length?ranked:null;
  }catch(e){ console.error('ai rank error',e); return null; }
}

function render(results){
  let list;
  if(viewFilters){
    const minRev=+$('#minReviews').value||0, minRat=+$('#minRating').value||0, pmax=+$('#price').value;
    list=results.filter(r=>(r.p.rating??0)>=minRat && (r.p.userRatingCount??0)>=minRev);
    if(pmax<4) list=list.filter(r=>{ const rk=priceRank(r.p.priceLevel); return rk==null||rk<=pmax; });
  } else { list=results; }
  const label = viewLabel || currentLabel();

    $('#results').innerHTML=`<div class="empty"><span class="big">${esc(L.t.noResBig)}</span>${esc(L.t.noResText)}</div>`;

  }
  const sorted = (viewKeepOrder && !userSorted) ? list : [...list].sort((a,b)=>{
    if(sortMode==='dist') return a.dist-b.dist;
    if(sortMode==='reviews') return (b.p.userRatingCount||0)-(a.p.userRatingCount||0);
    const rd=(b.p.rating||0)-(a.p.rating||0);
    if(rd!==0) return rd;
    return (b.p.userRatingCount||0)-(a.p.userRatingCount||0);
  });
  syncSortButtons();
  $('#count').textContent=`${label} · ${sorted.length}${L.t.doneUnit}`; bumpCount();
  drawMarkers(sorted);
  $('#results').innerHTML=sorted.map((r,i)=>cardHTML(r,i+1)).join('');

function cardHTML(r,rank){
  const p=r.p;

  const hasR=p.rating!=null&&p.userRatingCount!=null;

  const ribbon=(hasR&&p.rating>=4.6&&p.userRatingCount>=1000)?`<span class="ribbon">${esc(L.t.mustEat)}</span>`:'';
  const ratingHtml = hasR
    ? `<span class="stars ${heat(p.rating)}">${star()} ${p.rating.toFixed(1)}</span><span>·</span><span>${p.userRatingCount.toLocaleString('en-US')}${esc(L.t.reviews)}</span>`
    : `<span class="pill">${esc(L.t.noRating)}</span>`;
  const hi=hoursInfo(p);
  let hoursHtml='';
  if(hi){
    const badge=hi.openNow?`<span class="open"><i class="dot"></i>${esc(L.t.hrOpen)}</span>`:`<span class="closed">${esc(L.t.hrClosed)}</span>`;
    const txt=hi.todayStr?esc(hi.todayStr):(hi.openNow?'':esc(L.t.hrClosedToday));
    hoursHtml=`<div class="hours">${badge}${txt?' '+txt:''}</div>`;
  }
  const whyHtml = r.reason ? `<div class="why"><span class="sp">✦</span>${esc(r.reason)}</div>` : '';
  return `<div class="card" style="--i:${rank-1}">
    <div class="rank">${rank}</div>
    <div class="body">
      <p class="name">${name}${ribbon}</p>
      <div class="meta">
        ${ratingHtml}
        <span class="pill">${dist}</span>
        ${typeLabel?`<span class="pill">${esc(typeLabel)}</span>`:''}
        ${price?`<span class="pill">${price}</span>`:''}
      </div>
      ${whyHtml}${hoursHtml}${addr?`<p class="addr" title="${addr}">${addr}</p>`:''}
      <a class="gmlink" href="${link}" target="_blank" rel="noopener">${esc(L.t.openMap)}</a>
    </div>
  </div>`;
}
const PRICE={PRICE_LEVEL_FREE:'Free',PRICE_LEVEL_INEXPENSIVE:'$',PRICE_LEVEL_MODERATE:'$$',PRICE_LEVEL_EXPENSIVE:'$$$',PRICE_LEVEL_VERY_EXPENSIVE:'$$$$'};
function typeName(p){ return p.primaryTypeDisplayName ? (typeof p.primaryTypeDisplayName==='string'?p.primaryTypeDisplayName:(p.primaryTypeDisplayName.text||'')) : ''; }

async function drawMarkers(sorted){
  clearMarkers();
  const { AdvancedMarkerElement } = await google.maps.importLibrary("marker");
  sorted.forEach((r,i)=>{
    const el=document.createElement('div'); el.className='pin'; el.innerHTML=`<span>${i+1}</span>`;
    el.style.setProperty('--mi', Math.min(i,12));
    const mk=new AdvancedMarkerElement({ map, position:r.p.location, content:el });
    mk.addListener('click',()=>focusResult(i));
    resultMarkers.push(mk);
  });
}
function clearMarkers(){ resultMarkers.forEach(m=>m.map=null); resultMarkers=[]; }
function focusResult(i){
  const cards=document.querySelectorAll('.card'); cards.forEach(c=>c.classList.remove('active'));
  if(cards[i]){ cards[i].classList.add('active'); cards[i].scrollIntoView({behavior:'smooth',block:'nearest'}); }
  const mk=resultMarkers[i];
  if(mk){ const el=mk.content; if(el){ el.classList.remove('active'); void el.offsetWidth; el.classList.add('active'); } map.panTo(mk.position); if(map.getZoom()<15) map.setZoom(16); }
}
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function star(){ return `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.9 6.3 6.9.6-5.2 4.6 1.6 6.8L12 17.3 5.8 20.9l1.6-6.8L2.2 8.9l6.9-.6z"/></svg>`; }
</script>
