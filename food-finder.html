<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Place2Eat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,900&family=Noto+Serif+TC:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#fbf4e9; --paper:#fffaf2; --warm:#fdeede;
    --ink:#3a2f28; --ink-soft:#7d6c5d; --line:#ecd9c4;
    --persimmon:#e8552a; --tangerine:#f4843b; --saffron:#f6b53d;
    --chili:#c8341a; --herb:#5e8c4a; --herb-dark:#3f6b32;
    --flame:linear-gradient(118deg,#e8552a 0%,#f4843b 45%,#f6b53d 100%);
    --shadow:0 1px 2px rgba(58,47,40,.06),0 10px 30px rgba(200,90,40,.10);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:"Noto Serif TC","Hiragino Mincho ProN","Yu Mincho",serif;color:var(--ink);background:var(--cream);
    display:flex;flex-direction:column;min-height:100vh;-webkit-font-smoothing:antialiased;
  }

  header{
    padding:18px 24px;color:#fff;position:relative;overflow:hidden;
    background:var(--flame);background-size:200% 200%;animation:flow 14s ease infinite;
    display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;
  }
  @keyframes flow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
  header::after{content:"";position:absolute;inset:0;background:radial-gradient(120% 80% at 90% -20%,rgba(255,255,255,.28),transparent 60%);pointer-events:none}
  .brand{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;position:relative;z-index:1}
  h1{font-family:"Fraunces",serif;font-weight:900;font-size:28px;margin:0;letter-spacing:-.015em;text-shadow:0 2px 8px rgba(150,50,20,.25)}
  .tagline{font-size:13.5px;margin:0;color:rgba(255,255,255,.92);max-width:560px}
  .region{display:flex;gap:6px;position:relative;z-index:1}
  .region button{font-family:inherit;font-size:13px;font-weight:500;padding:5px 13px;border-radius:18px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.5);color:#fff;cursor:pointer;transition:background .15s}
  .region button:hover{background:rgba(255,255,255,.3)}
  .region button.on{background:#fff;color:var(--persimmon);border-color:#fff}

  .gate{max-width:560px;margin:7vh auto;padding:34px 32px;background:var(--paper);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow)}
  .gate h2{font-family:"Fraunces",serif;font-weight:600;font-size:21px;margin:0 0 10px;color:var(--persimmon)}
  .gate p{font-size:14px;line-height:1.75;color:var(--ink-soft);margin:0 0 14px}
  .gate ol{font-size:13.5px;line-height:1.8;color:var(--ink-soft);padding-left:20px;margin:0 0 18px}
  .gate code{background:var(--warm);padding:1px 6px;border-radius:5px;font-size:12.5px;color:var(--chili)}
  .keyrow{display:flex;gap:10px;flex-wrap:wrap}
  .keyrow input{flex:1;min-width:220px}

  input[type=text],input[type=password],input[type=number]{
    font-family:inherit;font-size:14px;color:var(--ink);
    padding:10px 13px;border:1px solid var(--line);border-radius:10px;background:var(--paper);outline:none;transition:border-color .15s,box-shadow .15s;
  }
  input:focus{border-color:var(--tangerine);box-shadow:0 0 0 3px rgba(244,132,59,.2)}

  button{font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;border:none;border-radius:10px;padding:10px 18px;color:#fff;background:var(--flame);background-size:160% 160%;transition:transform .08s,box-shadow .15s,background-position .3s}
  button:hover{background-position:100% 0;box-shadow:0 6px 18px rgba(232,85,42,.32)}
  button:active{transform:translateY(1px) scale(.99)}
  button.ghost{background:transparent;color:var(--persimmon);border:1px solid var(--line)}
  button.ghost:hover{background:var(--warm);border-color:var(--tangerine);box-shadow:none}
  button.ghost.on{background:var(--persimmon);color:#fff;border-color:var(--persimmon)}

  .controls{display:flex;gap:18px 26px;flex-wrap:wrap;align-items:flex-end;padding:16px 24px 14px;border-bottom:1px solid var(--line);background:var(--paper)}
  .field{display:flex;flex-direction:column;gap:5px}
  .field label{font-size:11.5px;letter-spacing:.04em;color:var(--ink-soft);text-transform:uppercase;font-family:"Fraunces",serif;font-weight:600}
  .field .val{font-family:"Fraunces",serif;font-weight:700;color:var(--persimmon)}
  .seg{display:flex;gap:6px}
  input[type=range]{width:170px;accent-color:var(--persimmon)}
  .num{width:80px}
  .grow{flex:1}
  .searchbtn{padding:11px 28px;font-size:15px;font-weight:700}

  .catbar{display:flex;align-items:flex-start;gap:14px;padding:14px 24px;border-bottom:1px solid var(--line);background:var(--warm)}
  .catlabel{font-family:"Fraunces",serif;font-weight:700;color:var(--chili);font-size:15px;white-space:nowrap;padding-top:6px}
  .chips{display:flex;gap:9px;flex-wrap:wrap}
  .chip{font-family:inherit;font-size:14px;padding:7px 15px;border-radius:22px;background:var(--paper);border:1px solid var(--line);color:var(--ink-soft);cursor:pointer;transition:transform .12s,background .15s,color .15s,border-color .15s,box-shadow .15s}
  .chip:hover{border-color:var(--tangerine);color:var(--ink);transform:translateY(-2px)}
  .chip.on{background:var(--flame);color:#fff;border-color:transparent;box-shadow:0 5px 14px rgba(232,85,42,.3);transform:translateY(-1px)}

  main{flex:1;display:grid;grid-template-columns:minmax(0,1.4fr) minmax(330px,1fr);min-height:0}
  #map{width:100%;height:100%;min-height:380px;background:var(--warm)}
  .panel{display:flex;flex-direction:column;border-left:1px solid var(--line);background:var(--cream);min-height:0}
  .panel-head{padding:13px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--paper)}
  .count{font-family:"Fraunces",serif;font-weight:700;font-size:15px;color:var(--persimmon)}
  .sort{display:flex;gap:5px}
  .sort button{padding:6px 11px;font-size:12.5px;background:transparent;color:var(--ink-soft);border:1px solid var(--line)}
  .sort button:hover{box-shadow:none;background:var(--warm)}
  .sort button.on{background:var(--herb);color:#fff;border-color:var(--herb)}
  .results{flex:1;overflow-y:auto;padding:8px 14px 24px}

  .card{position:relative;display:flex;gap:13px;padding:15px 14px 15px 12px;border-bottom:1px solid var(--line);cursor:pointer;border-radius:12px;transition:background .12s,transform .12s,box-shadow .15s;animation:rise .5s cubic-bezier(.2,.7,.2,1) both;animation-delay:calc(var(--i,0)*45ms)}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  .card:hover{background:var(--paper);transform:translateY(-2px);box-shadow:var(--shadow)}
  .card.active{background:var(--paper);box-shadow:inset 4px 0 0 var(--persimmon),var(--shadow)}
  .rank{flex:none;width:30px;height:30px;border-radius:50%;background:var(--flame);color:#fff;font-family:"Fraunces",serif;font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center;margin-top:2px;box-shadow:0 3px 8px rgba(232,85,42,.35)}
  .body{flex:1;min-width:0}
  .name{font-weight:700;font-size:16.5px;color:var(--ink);margin:0 0 6px;line-height:1.35}
  .ribbon{display:inline-block;font-size:11px;font-weight:700;color:#fff;background:var(--chili);padding:1px 8px;border-radius:5px;margin-left:7px;vertical-align:2px;letter-spacing:.05em}
  .meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:13px;color:var(--ink-soft)}
  .stars{display:inline-flex;align-items:center;gap:4px;font-family:"Fraunces",serif;font-weight:700}
  .stars svg{width:15px;height:15px}
  .stars.hot{color:var(--chili)} .stars.warm{color:var(--persimmon)} .stars.mild{color:#c98a1e}
  .pill{font-size:11.5px;padding:2px 9px;border-radius:20px;background:var(--warm);border:1px solid var(--line);color:var(--ink-soft)}
  .addr{font-size:12.5px;color:var(--ink-soft);margin:8px 0 0;line-height:1.5;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .gmlink{font-size:12.5px;color:var(--herb-dark);text-decoration:none;border-bottom:1.5px solid var(--herb);margin-top:8px;display:inline-block;transition:color .12s,border-color .12s}
  .gmlink:hover{color:var(--persimmon);border-color:var(--tangerine)}

  .empty,.loading{padding:44px 26px;text-align:center;color:var(--ink-soft);font-size:14px;line-height:1.85}
  .empty .big{font-family:"Fraunces",serif;font-size:19px;color:var(--persimmon);display:block;margin-bottom:8px}
  .sizzle{display:flex;gap:7px;justify-content:center;margin-bottom:16px}
  .sizzle span{width:12px;height:12px;border-radius:50%;background:var(--flame);animation:bob .7s ease-in-out infinite}
  .sizzle span:nth-child(2){animation-delay:.12s}
  .sizzle span:nth-child(3){animation-delay:.24s}
  @keyframes bob{0%,100%{transform:translateY(0);opacity:.6}50%{transform:translateY(-10px);opacity:1}}

  .pin{width:32px;height:32px;border-radius:50%;background:var(--flame);border:2.5px solid #fff;box-shadow:0 3px 8px rgba(150,50,20,.4);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .15s}
  .pin span{color:#fff;font-family:"Fraunces",serif;font-weight:700;font-size:14px}
  .pin:hover{transform:scale(1.15)}
  .pin.active{animation:pop .5s ease}
  @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.4)}100%{transform:scale(1.15)}}
  .ctr{width:20px;height:20px;border-radius:50%;background:var(--herb);border:3px solid #fff;box-shadow:0 0 0 5px rgba(94,140,74,.28),0 2px 6px rgba(0,0,0,.25);cursor:grab;animation:beat 2s ease-in-out infinite}
  @keyframes beat{0%,100%{box-shadow:0 0 0 5px rgba(94,140,74,.28),0 2px 6px rgba(0,0,0,.25)}50%{box-shadow:0 0 0 11px rgba(94,140,74,0),0 2px 6px rgba(0,0,0,.25)}}

  .note{font-size:12px;color:var(--ink-soft);padding:11px 20px;border-top:1px solid var(--line);background:var(--paper);line-height:1.6}
  .hidden{display:none!important}
  .err{color:var(--chili);font-size:13px;margin-top:10px}

  @media (max-width:860px){
    main{grid-template-columns:1fr;grid-template-rows:44vh auto}
    .panel{border-left:none;border-top:1px solid var(--line)}
    #map{min-height:0}
    h1{font-size:24px}
    input[type=range]{width:130px}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1 id="brand">Place2Eat</h1>
    <p class="tagline" id="tagline"></p>
  </div>
  <div class="region" id="region">
    <button data-region="tw">台灣</button>
    <button data-region="us">US</button>
    <button data-region="jp">日本</button>
  </div>
</header>

<div id="gate" class="gate hidden">
  <h2 id="gateH2"></h2>
  <p id="gateP"></p>
  <ol><li id="gateLi1"></li><li id="gateLi2"></li></ol>
  <div class="keyrow">
    <input type="password" id="keyInput" autocomplete="off">
    <button id="keyGo"></button>
  </div>
  <div id="keyErr" class="err"></div>
</div>

<div id="app" class="hidden" style="display:flex;flex-direction:column;flex:1;min-height:0">
  <div class="controls">
    <div class="field">
      <label id="centerLabel"></label>
      <div class="seg">
        <button class="ghost" id="locBtn"></button>
        <button class="ghost" id="pinBtn"></button>
      </div>
    </div>
    <div class="field">
      <label id="goLabel"></label>
      <input type="text" id="goInput" style="width:180px" autocomplete="off">
    </div>
    <div class="field">
      <label><span id="radiusLabel"></span> <span class="val" id="radVal"></span></label>
      <input type="range" id="radius" min="500" max="5000" step="100" value="2000">
    </div>
    <div class="field"><label id="minRevLabel"></label><input type="number" class="num" id="minReviews" min="0" step="50" value="300"></div>
    <div class="field"><label id="minRatLabel"></label><input type="number" class="num" id="minRating" min="0" max="5" step="0.1" value="4.0"></div>
    <div class="field grow"></div>
    <div class="field"><label>&nbsp;</label><button class="searchbtn" id="searchBtn"></button></div>
  </div>

  <div class="catbar">
    <span class="catlabel" id="catlabel"></span>
    <div class="chips" id="chips"></div>
  </div>

  <main>
    <div id="map"></div>
    <div class="panel">
      <div class="panel-head">
        <span class="count" id="count"></span>
        <div class="sort">
          <button data-sort="rating" class="on" id="sRating"></button>
          <button data-sort="reviews" id="sPop"></button>
          <button data-sort="dist" id="sDist"></button>
        </div>
      </div>
      <div class="results" id="results"></div>
      <div class="note" id="note"></div>
    </div>
  </main>
</div>

      errEmpty:'先にキーを貼り付けてください。', errLoad:'地図の読み込みに失敗しました。キーと有効な API を確認してください。',
      centerLabel:'検索の中心', myLoc:'現在地', locating:'位置取得中…', pickMap:'地図で指定',
      goLabel:'場所へ移動', goPh:'例：渋谷',
      radiusLabel:'検索半径', minRev:'レビュー数 ≥', minRat:'評価 ≥', searchBtn:'この範囲を検索',
      findLabel:'お店の種類', sRating:'評価', sPop:'人気', sDist:'距離',
      initCount:'種類を選んでスタート',
      initBig:'中心を決めて、種類を選択',
      initText:'種類を選ぶと自動で検索します。レビュー数と評価の両方を満たすお店だけを表示——多くの人が訪れて高評価なので、サクラの可能性は低くなります。',
      noResBig:'この範囲に該当なし', noResText:'半径を広げるか、「レビュー数 ≥」を下げて再検索してください。',
      note:'種類ごとに人気順で取得して統合します（レビュー数の多い店を優先）。1 回の検索は最大 20 件。密集地では半径を狭めるか、より具体的な種類を選んでください。',
      loading:'検索中…レビュー数と評価を照合', failBig:'検索に失敗しました',
      failText:'キーで Places API (New) が有効で、ドメイン制限に阻まれていないか確認してください。',
      searching:'検索中…', errCount:'エラー', doneUnit:' 件', reviews:' 件のレビュー',
      mustEat:'人気', openMap:'Google マップで開く ↗',
      alertNoGeo:'この端末は位置情報に対応していません。', alertGeoFail:'位置を取得できませんでした。「地図で指定」を使ってください。',
    },
    cats:[
      {id:'all',    zh:'すべて',       types:['restaurant','meal_takeaway','cafe','bakery','bar']},
      {id:'ramen',  zh:'ラーメン',     types:['ramen_restaurant','noodle_shop']},
      {id:'sushi',  zh:'寿司',         types:['sushi_restaurant','japanese_restaurant']},
      {id:'izakaya',zh:'居酒屋',       types:['japanese_izakaya_restaurant','bar']},
      {id:'yakiniku',zh:'焼肉',        types:['yakiniku_restaurant','barbecue_restaurant','korean_barbecue_restaurant']},
      {id:'teishoku',zh:'定食・食堂',  types:['japanese_restaurant','diner','family_restaurant','cafeteria']},
      {id:'soba',   zh:'そば・うどん', types:['noodle_shop','japanese_restaurant']},
      {id:'tonkatsu',zh:'とんかつ',    types:['tonkatsu_restaurant']},
      {id:'curry',  zh:'カレー',       types:['japanese_curry_restaurant']},
      {id:'cafe',   zh:'カフェ・喫茶', types:['cafe','coffee_shop','coffee_stand','tea_house']},
      {id:'fast',   zh:'ファストフード',types:['fast_food_restaurant','hamburger_restaurant']},
      {id:'bake',   zh:'パン屋',       types:['bakery','cake_shop','pastry_shop','donut_shop']},
      {id:'sweet',  zh:'スイーツ・甘味',types:['dessert_shop','dessert_restaurant','ice_cream_shop','confectionery']},
      {id:'bar',    zh:'バー',         types:['bar','wine_bar','cocktail_bar','pub','beer_garden']},
      {id:'cvs',    zh:'コンビニ',     types:['convenience_store']},
      {id:'super',  zh:'スーパー',     types:['supermarket','grocery_store','asian_grocery_store']},
    ],
  },
};

let region = 'tw';
let L = LOCALES.tw;
let map, centerMarker, searchCircle, searchCenter;
let resultMarkers = [], lastResults = [];
let sortMode = localStorage.getItem('ff_sort') || 'rating';
let selectedCat = 'all';
let pinMode = false, userLocated = false;

const catLabel = id => (L.cats.find(c=>c.id===id)||L.cats[0]).zh;
const chunk = (a,n) => { const o=[]; for(let i=0;i<a.length;i+=n) o.push(a.slice(i,i+n)); return o; };

/* ============== locale application ============== */
function applyLocale(){
  const t=L.t;
  document.documentElement.lang=L.lang;
  document.title=t.brand;
  $('#brand').textContent=t.brand;
  $('#tagline').textContent=t.tagline;
  $('#gateH2').textContent=t.gateH2; $('#gateP').textContent=t.gateP;
  $('#gateLi1').textContent=t.gateLi1; $('#gateLi2').textContent=t.gateLi2;
  $('#keyInput').placeholder=t.keyPh; $('#keyGo').textContent=t.keyGo;
  $('#centerLabel').textContent=t.centerLabel;
  $('#goLabel').textContent=t.goLabel; $('#goInput').placeholder=t.goPh;
  $('#locBtn').textContent=t.myLoc; $('#pinBtn').textContent=t.pickMap;
  $('#radiusLabel').textContent=t.radiusLabel;
  $('#minRevLabel').textContent=t.minRev; $('#minRatLabel').textContent=t.minRat;
  $('#searchBtn').textContent=t.searchBtn; $('#catlabel').textContent=t.findLabel;
  $('#sRating').textContent=t.sRating; $('#sPop').textContent=t.sPop; $('#sDist').textContent=t.sDist;
  $('#note').textContent=t.note;
  document.querySelectorAll('.region button').forEach(b=>b.classList.toggle('on',b.dataset.region===region));
  // radius slider config
  const r=L.rad, el=$('#radius');
  el.min=r.min; el.max=r.max; el.step=r.step;
  if(+el.value<r.min||+el.value>r.max) el.value=r.def;
  updateRadLabel();
}

function setRegion(r){
  if(!LOCALES[r]) r='tw';
  if(r===region && map) return;
  region=r; L=LOCALES[r]; selectedCat=L.cats[0].id;
  localStorage.setItem('ff_region',r);
  if(history.replaceState) history.replaceState(null,'','#'+r);
  applyLocale();
  if(map){
    if(searchCircle) searchCircle.setRadius(+$('#radius').value);
    setCenter(new google.maps.LatLng(L.fallback.lat,L.fallback.lng),true);
    map.setZoom(12);
    userLocated=true;   // explicit region choice; don't let async geolocation override it
    renderChips();
    showInitial();
    clearMarkers();
  }
}

function showInitial(){
  $('#results').innerHTML=`<div class="empty"><span class="big">${esc(L.t.initBig)}</span>${esc(L.t.initText)}</div>`;
  $('#count').textContent=L.t.initCount;
}

/* ============== key resolution ============== */
const INJECTED = "%%GOOGLE_MAPS_KEY%%";
function resolveKey(){
  if(window.GOOGLE_MAPS_KEY) return window.GOOGLE_MAPS_KEY;
  if(INJECTED && INJECTED.indexOf('%%')!==0) return INJECTED;
  return localStorage.getItem('ff_key') || '';
}

(function init(){
  const h=(location.hash||'').replace('#','');
  region = LOCALES[h] ? h : (LOCALES[localStorage.getItem('ff_region')] ? localStorage.getItem('ff_region') : 'tw');
  L=LOCALES[region]; selectedCat=L.cats[0].id;
  if(localStorage.getItem('ff_rev')) $('#minReviews').value=localStorage.getItem('ff_rev');
  if(localStorage.getItem('ff_rat')) $('#minRating').value=localStorage.getItem('ff_rat');
  applyLocale();
  document.querySelectorAll('.region button').forEach(b=>b.addEventListener('click',()=>setRegion(b.dataset.region)));
  const key=resolveKey();
  if(key) boot(key); else $('#gate').classList.remove('hidden');
})();

$('#keyGo').addEventListener('click', () => {
  const k=$('#keyInput').value.trim();
  if(!k){ $('#keyErr').textContent=L.t.errEmpty; return; }
  localStorage.setItem('ff_key',k); boot(k);
});
$('#keyInput').addEventListener('keydown', e => { if(e.key==='Enter') $('#keyGo').click(); });

function boot(key){
  loadMapsApi(key).then(initApp).catch(err=>{
    $('#gate').classList.remove('hidden'); $('#keyErr').textContent=L.t.errLoad; console.error(err);
  });
}
function loadMapsApi(key){
  return new Promise((resolve,reject)=>{
    if(window.google&&window.google.maps&&window.google.maps.importLibrary){ resolve(); return; }
    ((g)=>{var h,a,k,p="The Google Maps JavaScript API",c="google",l="importLibrary",q="__ib__",m=document,b=window;b=b[c]||(b[c]={});var d=b.maps||(b.maps={}),r=new Set,e=new URLSearchParams,u=()=>h||(h=new Promise(async(f,n)=>{await(a=m.createElement("script"));e.set("libraries",[...r]+"");for(k in g)e.set(k.replace(/[A-Z]/g,t=>"_"+t[0].toLowerCase()),g[k]);e.set("callback",c+".maps."+q);a.src=`https://maps.${c}apis.com/maps/api/js?`+e;d[q]=f;a.onerror=()=>h=n(Error(p+" could not load."));a.nonce=m.querySelector("script[nonce]")?.nonce||"";m.head.append(a)}));d[l]?console.warn(p+" only loads once. Ignoring:",g):d[l]=(f,...n)=>r.add(f)&&u().then(()=>d[l](f,...n))})({key:key,v:"weekly"});
    const t0=Date.now();
    const iv=setInterval(()=>{
      if(window.google&&window.google.maps&&window.google.maps.importLibrary){clearInterval(iv);resolve();}
      else if(Date.now()-t0>15000){clearInterval(iv);reject(new Error('timeout'));}
    },80);
  });
}

/* ============== app ============== */
async function initApp(){
  $('#gate').classList.add('hidden'); $('#app').classList.remove('hidden');
  const { Map } = await google.maps.importLibrary("maps");
  const { AdvancedMarkerElement } = await google.maps.importLibrary("marker");

  map = new Map($('#map'), {
    center:L.fallback, zoom:14, mapId:'DEMO_MAP_ID',
    mapTypeControl:false, streetViewControl:false, fullscreenControl:false, clickableIcons:false,
  });
  searchCenter = new google.maps.LatLng(L.fallback.lat, L.fallback.lng);

  const cEl=document.createElement('div'); cEl.className='ctr';
  centerMarker = new AdvancedMarkerElement({ map, position:searchCenter, content:cEl, gmpDraggable:true, zIndex:9999 });
  centerMarker.addListener('dragend', ()=>{ userLocated=true; setCenter(toLatLng(centerMarker.position), false); });

  searchCircle = new google.maps.Circle({ map, center:searchCenter, radius:+$('#radius').value,
    strokeColor:'#e8552a', strokeOpacity:.55, strokeWeight:1.5, fillColor:'#f6b53d', fillOpacity:.10, clickable:false });

  map.addListener('click', e=>{ if(pinMode){ userLocated=true; setCenter(e.latLng,true); pinMode=false; $('#pinBtn').classList.remove('on'); }});

  $('#radius').addEventListener('input', ()=>{ updateRadLabel(); searchCircle.setRadius(+$('#radius').value); });
  $('#minReviews').addEventListener('change', ()=>localStorage.setItem('ff_rev',$('#minReviews').value));
  $('#minRating').addEventListener('change', ()=>localStorage.setItem('ff_rat',$('#minRating').value));
  $('#searchBtn').addEventListener('click', runSearch);
  $('#locBtn').addEventListener('click', useMyLocation);
  $('#pinBtn').addEventListener('click', ()=>{ pinMode=!pinMode; $('#pinBtn').classList.toggle('on',pinMode); });
  $('#goInput').addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); goToPlace(); } });
  document.querySelectorAll('.sort button').forEach(b=>{
    if(b.dataset.sort===sortMode){ document.querySelectorAll('.sort button').forEach(x=>x.classList.remove('on')); b.classList.add('on'); }
    b.addEventListener('click',()=>{
      sortMode=b.dataset.sort; localStorage.setItem('ff_sort',sortMode);
      document.querySelectorAll('.sort button').forEach(x=>x.classList.remove('on')); b.classList.add('on');
      if(lastResults.length) render(lastResults);
    });
  });

  renderChips();
  showInitial();
  silentGeolocate();
}

function silentGeolocate(){
  if(!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(pos=>{
    if(userLocated) return;   // user already picked a point or chose a region — don't yank the map
    userLocated=true;
    setCenter(new google.maps.LatLng(pos.coords.latitude,pos.coords.longitude),true); map.setZoom(15);
  }, ()=>{}, { enableHighAccuracy:true, timeout:8000 });
}

function renderChips(){
  const wrap=$('#chips'); wrap.innerHTML='';
  L.cats.forEach(cat=>{
    const b=document.createElement('button');
    b.className='chip'+(cat.id===selectedCat?' on':'');
    b.textContent=cat.zh; b.dataset.id=cat.id;
    b.addEventListener('click',()=>{
      selectedCat=cat.id;
      document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));
      b.classList.add('on'); runSearch();
    });
    wrap.appendChild(b);
  });
}

function toLatLng(p){ if(!p) return searchCenter; if(typeof p.lat==='function') return p; return new google.maps.LatLng(p.lat,p.lng); }
function setCenter(ll,pan){ searchCenter=toLatLng(ll); centerMarker.position=searchCenter; searchCircle.setCenter(searchCenter); if(pan) map.panTo(searchCenter); }
function updateRadLabel(){
  const m=+$('#radius').value;
  const v=(L.unit==='mi')?(m/1609.34).toFixed(1):(m/1000).toFixed(1);
  $('#radVal').textContent=v+L.radUnit;
}
function distFmt(m){
  if(L.unit==='mi'){ return m<160 ? Math.round(m*3.281)+' ft' : (m/1609.34).toFixed(1)+' mi'; }
  return m<1000 ? Math.round(m)+L.nearSuffix : (m/1000).toFixed(1)+L.farSuffix;
}

async function goToPlace(){
  const q=$('#goInput').value.trim(); if(!q) return;
  const { Place } = await google.maps.importLibrary("places");
  try{
    const { places } = await Place.searchByText({ textQuery:q, fields:['location','viewport','displayName'], maxResultCount:1, language:L.apiLang });
    if(places&&places[0]){
      const pl=places[0]; userLocated=true;
      setCenter(toLatLng(pl.location), false);
      if(pl.viewport) map.fitBounds(pl.viewport); else { map.panTo(searchCenter); map.setZoom(14); }
    }
  }catch(e){ console.error('searchByText error',e); }
}

function useMyLocation(){
  if(!navigator.geolocation){ alert(L.t.alertNoGeo); return; }
  $('#locBtn').textContent=L.t.locating;
  navigator.geolocation.getCurrentPosition(pos=>{
    userLocated=true;
    setCenter(new google.maps.LatLng(pos.coords.latitude,pos.coords.longitude),true); map.setZoom(15);
    $('#locBtn').textContent=L.t.myLoc;
  }, ()=>{ $('#locBtn').textContent=L.t.myLoc; alert(L.t.alertGeoFail); },
  { enableHighAccuracy:true, timeout:10000 });
}

/* ============== search ============== */
async function runSearch(){
  const radius=+$('#radius').value, minRev=+$('#minReviews').value||0, minRat=+$('#minRating').value||0;
  $('#results').innerHTML=`<div class="loading"><div class="sizzle"><span></span><span></span><span></span></div>${esc(L.t.loading)}</div>`;
  $('#count').textContent=L.t.searching; clearMarkers();

  const { Place, SearchNearbyRankPreference } = await google.maps.importLibrary("places");
  const { spherical } = await google.maps.importLibrary("geometry");

  const cat=L.cats.find(c=>c.id===selectedCat)||L.cats[0];
  const chunks=chunk(cat.types,4);
  const seen=new Map(); let failed=0;
  for(const types of chunks){
    const request={
      fields:['id','displayName','location','rating','userRatingCount','formattedAddress','googleMapsURI','primaryTypeDisplayName','types','priceLevel','businessStatus'],
      locationRestriction:{ center:searchCenter, radius },
      includedTypes:types, maxResultCount:20,
      rankPreference:SearchNearbyRankPreference.POPULARITY, language:L.apiLang,
    };
    try{ const { places } = await Place.searchNearby(request); (places||[]).forEach(p=>{ if(p.id&&!seen.has(p.id)) seen.set(p.id,p); }); }
    catch(e){ failed++; console.error('searchNearby error',e); }
  }
  if(failed===chunks.length){
    $('#results').innerHTML=`<div class="empty"><span class="big">${esc(L.t.failBig)}</span>${esc(L.t.failText)}</div>`;
    $('#count').textContent=L.t.errCount; return;
  }

  const results=[...seen.values()]
    .filter(p=>p.rating!=null&&p.userRatingCount!=null&&p.rating>=minRat&&p.userRatingCount>=minRev&&(p.businessStatus==null||p.businessStatus==='OPERATIONAL'))
    .map(p=>({ p, dist:spherical.computeDistanceBetween(searchCenter,p.location) }));
  lastResults=results; render(results);
}

function render(results){
  if(!results.length){
    $('#results').innerHTML=`<div class="empty"><span class="big">${esc(L.t.noResBig)}</span>${esc(L.t.noResText)}</div>`;
    $('#count').textContent=`${catLabel(selectedCat)} · 0${L.t.doneUnit}`; clearMarkers(); return;
  }
  const sorted=[...results].sort((a,b)=>{
    if(sortMode==='dist') return a.dist-b.dist;
    if(sortMode==='reviews') return b.p.userRatingCount-a.p.userRatingCount;
    if(b.p.rating!==a.p.rating) return b.p.rating-a.p.rating;
    return b.p.userRatingCount-a.p.userRatingCount;
  });
  $('#count').textContent=`${catLabel(selectedCat)} · ${sorted.length}${L.t.doneUnit}`;
  drawMarkers(sorted);
  $('#results').innerHTML=sorted.map((r,i)=>cardHTML(r,i+1)).join('');
  document.querySelectorAll('.card').forEach((el,i)=>el.addEventListener('click',e=>{ if(e.target.closest('a')) return; focusResult(i); }));
  const bounds=new google.maps.LatLngBounds(); bounds.extend(searchCenter);
  sorted.forEach(r=>bounds.extend(r.p.location)); map.fitBounds(bounds,60);
}

function heat(r){ return r>=4.7?'hot':r>=4.4?'warm':'mild'; }
function cardHTML(r,rank){
  const p=r.p;
  const name=esc(typeof p.displayName==='string'?p.displayName:(p.displayName?.text||'—'));
  const rating=p.rating.toFixed(1), reviews=p.userRatingCount.toLocaleString('en-US');
  const dist=distFmt(r.dist);
  const typeLabel=typeName(p), price=p.priceLevel?(PRICE[p.priceLevel]||''):'';
  const addr=esc(p.formattedAddress||'');
  const link=p.googleMapsURI||('https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(name));
  const ribbon=(p.rating>=4.6&&p.userRatingCount>=1000)?`<span class="ribbon">${esc(L.t.mustEat)}</span>`:'';
  return `<div class="card" style="--i:${rank-1}">
    <div class="rank">${rank}</div>
    <div class="body">
      <p class="name">${name}${ribbon}</p>
      <div class="meta">
        <span class="stars ${heat(p.rating)}">${star()} ${rating}</span>
        <span>·</span><span>${reviews}${esc(L.t.reviews)}</span>
        <span class="pill">${dist}</span>
        ${typeLabel?`<span class="pill">${esc(typeLabel)}</span>`:''}
        ${price?`<span class="pill">${price}</span>`:''}
      </div>
      ${addr?`<p class="addr" title="${addr}">${addr}</p>`:''}
      <a class="gmlink" href="${link}" target="_blank" rel="noopener">${esc(L.t.openMap)}</a>
    </div>
  </div>`;
}
const PRICE={PRICE_LEVEL_FREE:'Free',PRICE_LEVEL_INEXPENSIVE:'$',PRICE_LEVEL_MODERATE:'$$',PRICE_LEVEL_EXPENSIVE:'$$$',PRICE_LEVEL_VERY_EXPENSIVE:'$$$$'};
function typeName(p){ return p.primaryTypeDisplayName ? (typeof p.primaryTypeDisplayName==='string'?p.primaryTypeDisplayName:(p.primaryTypeDisplayName.text||'')) : ''; }

async function drawMarkers(sorted){
  clearMarkers();
  const { AdvancedMarkerElement } = await google.maps.importLibrary("marker");
  sorted.forEach((r,i)=>{
    const el=document.createElement('div'); el.className='pin'; el.innerHTML=`<span>${i+1}</span>`;
    const mk=new AdvancedMarkerElement({ map, position:r.p.location, content:el });
    mk.addListener('click',()=>focusResult(i));
    resultMarkers.push(mk);
  });
}
function clearMarkers(){ resultMarkers.forEach(m=>m.map=null); resultMarkers=[]; }
function focusResult(i){
  const cards=document.querySelectorAll('.card'); cards.forEach(c=>c.classList.remove('active'));
  if(cards[i]){ cards[i].classList.add('active'); cards[i].scrollIntoView({behavior:'smooth',block:'nearest'}); }
  const mk=resultMarkers[i];
  if(mk){ const el=mk.content; if(el){ el.classList.remove('active'); void el.offsetWidth; el.classList.add('active'); } map.panTo(mk.position); if(map.getZoom()<15) map.setZoom(16); }
}

function esc(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function star(){ return `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.9 6.3 6.9.6-5.2 4.6 1.6 6.8L12 17.3 5.8 20.9l1.6-6.8L2.2 8.9l6.9-.6z"/></svg>`; }
</script>
